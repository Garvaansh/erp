<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-bright": "#31394d",
                        "surface-container-lowest": "#060e20",
                        "on-secondary-container": "#a7b6cc",
                        "on-secondary-fixed": "#0d1c2d",
                        "on-secondary-fixed-variant": "#39485a",
                        "on-primary": "#003642",
                        "on-primary-fixed-variant": "#004e5f",
                        "on-tertiary-fixed-variant": "#005236",
                        "secondary-fixed": "#d4e4fa",
                        "surface-container": "#171f33",
                        "primary-container": "#009ebe",
                        "primary-fixed-dim": "#3cd7ff",
                        "surface-container-low": "#131b2e",
                        "on-secondary": "#233143",
                        "error": "#ffb4ab",
                        "tertiary-fixed": "#6ffbbe",
                        "inverse-surface": "#dae2fd",
                        "error-container": "#93000a",
                        "surface-tint": "#3cd7ff",
                        "on-tertiary-container": "#00311f",
                        "tertiary": "#4edea3",
                        "secondary-container": "#39485a",
                        "on-error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#4edea3",
                        "on-primary-fixed": "#001f27",
                        "surface": "#0b1326",
                        "surface-variant": "#2d3449",
                        "on-surface-variant": "#c1c6d7",
                        "surface-container-high": "#222a3d",
                        "on-surface": "#dae2fd",
                        "tertiary-container": "#00a572",
                        "primary": "#3cd7ff",
                        "surface-container-highest": "#2d3449",
                        "outline-variant": "#414755",
                        "secondary-fixed-dim": "#b9c8de",
                        "surface-dim": "#0b1326",
                        "on-tertiary": "#003824",
                        "on-background": "#dae2fd",
                        "secondary": "#b9c8de",
                        "inverse-primary": "#00677e",
                        "on-primary-container": "#002e3a",
                        "on-tertiary-fixed": "#002113",
                        "inverse-on-surface": "#283044",
                        "background": "#0b1326",
                        "on-error": "#690005",
                        "primary-fixed": "#b4ebff",
                        "outline": "#8b90a0"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(45, 52, 73, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .bg-industrial {
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(60, 215, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(78, 222, 163, 0.03) 0%, transparent 40%);
        }
        .floating-label-input:focus-within label,
        .floating-label-input input:not(:placeholder-shown) + label {
            transform: translateY(-1.5rem) scale(0.85);
            color: #3cd7ff;
        }
    </style>
</head>
<body class="bg-background font-body text-on-surface selection:bg-primary/30 min-h-screen flex items-center justify-center p-6 bg-industrial overflow-hidden">
<!-- Abstract Background Element -->
<div class="fixed inset-0 pointer-events-none z-0">
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-1/4 right-1/4 w-[500px] h-[500px] bg-tertiary/5 rounded-full blur-[150px]"></div>
<div class="absolute inset-0" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDvFdjiM_yDDGYukRH8S1njrecBnf2GWKGWxXkC-U0N0rIIi-Kc6Zht9S_PWgrOfTz2N-j2z0kCaH0CXrbyCYcYcGLDmz15bfyFzqecHNUU8g4erkgtpfuaMMy1JFBVMqQxsAZOcWiUr0n7CvFTwf14WQSSlV5-4NpLoozs2BlXXoJfOdk6hqmzwTi-vn2u2SHufMQ8OdDkroqbRDWivFGrBMdM9JH4f5topfVX1R9AK9Lsex-B-HgUVTUoTt52rINHG1g7TJw5XrB9'); opacity: 0.03;"></div>
</div>
<!-- Login Container -->
<main class="relative z-10 w-full max-w-[440px]">
<!-- Brand Identity -->
<div class="flex flex-col items-center mb-12">
<div class="w-16 h-16 mb-6 flex items-center justify-center bg-surface-container-high rounded-xl relative overflow-hidden group">
<div class="absolute inset-0 bg-gradient-to-br from-primary/20 to-transparent opacity-50"></div>
<span class="material-symbols-outlined text-primary text-4xl" data-icon="hardware" style="font-variation-settings: 'FILL' 1;">hardware</span>
</div>
<h1 class="font-headline text-2xl font-extrabold tracking-tight text-on-surface uppercase">Precision Architect</h1>
<p class="font-label text-[0.6875rem] font-bold tracking-[0.2em] text-on-surface-variant mt-2 uppercase">V2.4.0 Command Center</p>
</div>
<!-- Glassmorphic Card -->
<div class="glass-card p-10 rounded-xl shadow-[0_32px_64px_rgba(0,0,0,0.4)] border border-outline-variant/15">
<div class="mb-8">
<h2 class="font-headline text-xl font-bold text-on-surface">System Access</h2>
<p class="text-on-surface-variant text-sm mt-1">Authenticate to manage industrial assets.</p>
</div>
<form class="space-y-6">
<!-- Email Field -->
<div class="relative floating-label-input group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-lg group-focus-within:text-primary transition-colors" data-icon="alternate_email">alternate_email</span>
</div>
<input class="block w-full pl-11 pr-4 py-4 bg-surface-container-lowest border-none rounded-lg text-on-surface focus:ring-1 focus:ring-primary transition-all duration-300 placeholder-transparent" id="email" name="email" placeholder=" " type="email"/>
<label class="absolute left-11 top-4 text-on-surface-variant text-sm transition-all duration-300 pointer-events-none origin-left" for="email">
                        Corporate Email
                    </label>
</div>
<!-- Password Field -->
<div class="relative floating-label-input group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-lg group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-11 pr-12 py-4 bg-surface-container-lowest border-none rounded-lg text-on-surface focus:ring-1 focus:ring-primary transition-all duration-300 placeholder-transparent" id="password" name="password" placeholder=" " type="password"/>
<label class="absolute left-11 top-4 text-on-surface-variant text-sm transition-all duration-300 pointer-events-none origin-left" for="password">
                        Security Key
                    </label>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-on-surface-variant hover:text-primary" type="button">
<span class="material-symbols-outlined text-lg" data-icon="visibility">visibility</span>
</button>
</div>
<!-- Actions -->
<div class="flex items-center justify-between py-2">
<label class="flex items-center group cursor-pointer">
<input class="w-4 h-4 rounded border-none bg-surface-container-highest text-primary focus:ring-primary focus:ring-offset-background cursor-pointer" type="checkbox"/>
<span class="ml-3 text-xs text-on-surface-variant group-hover:text-on-surface transition-colors font-medium">Keep session active</span>
</label>
<a class="text-xs font-semibold text-primary hover:text-primary-container transition-colors tracking-wide" href="#">FORGOT KEY?</a>
</div>
<!-- Submit Button -->
<button class="w-full py-4 px-6 bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline font-extrabold uppercase tracking-widest text-xs rounded-lg shadow-lg shadow-primary/20 hover:brightness-110 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-3" type="submit">
                    Access Command Center
                    <span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Secondary Actions -->
<div class="mt-10 pt-8 border-t border-outline-variant/10 text-center">
<p class="text-xs text-on-secondary-fixed-variant">
                    Enterprise instance restricted to authorized personnel.
                </p>
<div class="mt-4 flex justify-center gap-6">
<a class="text-[0.6875rem] font-bold text-on-surface uppercase tracking-wider hover:text-primary transition-colors" href="#">Request Access</a>
<a class="text-[0.6875rem] font-bold text-on-surface uppercase tracking-wider hover:text-primary transition-colors" href="#">System Status</a>
</div>
</div>
</div>
<!-- Footer / Technical Meta -->
<footer class="mt-12 flex flex-col items-center gap-4 opacity-40">
<div class="h-px w-12 bg-primary"></div>
<div class="flex gap-8">
<div class="flex flex-col items-center">
<span class="font-label text-[0.6rem] font-bold uppercase tracking-tighter">Latency</span>
<span class="font-headline text-[0.65rem] font-bold text-tertiary">14ms</span>
</div>
<div class="flex flex-col items-center border-x border-outline-variant/30 px-8">
<span class="font-label text-[0.6rem] font-bold uppercase tracking-tighter">Security</span>
<span class="font-headline text-[0.65rem] font-bold text-primary">AES-256</span>
</div>
<div class="flex flex-col items-center">
<span class="font-label text-[0.6rem] font-bold uppercase tracking-tighter">Encrypted</span>
<span class="material-symbols-outlined text-[0.75rem] text-tertiary" data-icon="verified_user" style="font-variation-settings: 'FILL' 1;">verified_user</span>
</div>
</div>
</footer>
</main>
<!-- Decorative Corner Trace -->
<div class="fixed top-0 left-0 w-32 h-32 pointer-events-none overflow-hidden">
<div class="absolute top-0 left-0 w-full h-full border-t border-l border-primary/20 m-6"></div>
</div>
<div class="fixed bottom-0 right-0 w-32 h-32 pointer-events-none overflow-hidden">
<div class="absolute bottom-0 right-0 w-full h-full border-b border-r border-primary/20 m-6"></div>
</div>
</body></html>
